<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Diet & Beverage Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Weekly Meal Tracker</h1>
            <p>Log your meals, track healthiness, and record your daily beverages.</p>
        </header>

        <form id="dietForm">
            <div id="daysContainer"></div>
            
            <div class="button-group">
                <button type="button" id="refreshBtn" class="refresh-btn">Refresh</button>
                <button type="submit" class="submit-btn">Save & Analyze</button>
            </div>
        </form>

        <div id="statsContainer" class="stats-container">
            <h2>Weekly Statistics</h2>
            <div id="statsOutput"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
